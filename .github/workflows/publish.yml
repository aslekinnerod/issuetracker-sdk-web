name: Publish to npm

on:
  push:
    tags:
      # Match semver tags (0.5.6, 1.0.0, 1.0.0-rc.1). The version
      # in package.json must match the tag before pushing — see
      # the verify step below.
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    # id-token is required for OIDC trusted publishing + provenance.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Verify package.json version matches tag
        if: github.event_name == 'push'
        run: |
          tag="${GITHUB_REF_NAME}"
          pkg_version=$(node -p "require('./package.json').version")
          if [ "$tag" != "$pkg_version" ]; then
            echo "::error::Tag '$tag' does not match package.json version '$pkg_version'"
            exit 1
          fi

      # Node 22 ships npm 10, which only uses the OIDC id-token for
      # provenance signing — not for publish auth. OIDC trusted
      # publishing needs npm >= 11.5.1, so upgrade before publishing.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

      - name: Publish to npm
        run: npm publish --provenance --access public
